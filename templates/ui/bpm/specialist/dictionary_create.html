{% extends "ui/base.html" %}
{% block content %}
<a class="back-link" href="{% url 'ui-bpm-dictionaries' %}">← К списку справочников</a>
<h2>Новый справочник</h2>
<p class="text-muted">Шаг 1: задайте название. Далее вы попадёте в таблицу, где добавите колонки (ключи JSON) и строки.</p>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card" style="max-width:520px;">
  <form method="post">{% csrf_token %}
    <label>Название справочника</label>
    <input type="text" name="name" required placeholder="Например: Объекты производства" />
    <button type="submit" class="btn btn-save">Далее: структура и данные</button>
  </form>
</div>
{% endblock %}
